name: Reusable Service CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      project_key:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      DEVELOPMENT_TEAM_EMAIL:
        required: true
      GH_PAT:
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set Variables
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ inputs.service_name }}
          args: >
            -Dsonar.projectKey=${{ inputs.project_key }}
            -Dsonar.scanner.metadataFilePath=/github/workspace/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Setup Python
        if: inputs.service_name != 'frontend'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Snyk Scan (Python)
        if: inputs.service_name != 'frontend'
        run: |
          cd ${{ inputs.service_name }}
          pip install -r requirements.txt
          npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Setup Node
        if: inputs.service_name == 'frontend'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Snyk Scan (Frontend)
        if: inputs.service_name == 'frontend'
        run: |
          cd ${{ inputs.service_name }}
          npm install
          npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Lowercase Repository Name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ steps.repo.outputs.name }}/${{ inputs.service_name }}:${{ steps.vars.outputs.short_sha }} \
            ./${{ inputs.service_name }}

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ steps.repo.outputs.name }}/${{ inputs.service_name }}:${{ steps.vars.outputs.short_sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: docker push ghcr.io/${{ steps.repo.outputs.name }}/${{ inputs.service_name }}:${{ steps.vars.outputs.short_sha }}

      - name: Update values-dev.yaml and Push
        run: |
          git pull --rebase origin test
          yq eval ".${{ inputs.service_name }}.image.tag = \"${{ steps.vars.outputs.short_sha }}\"" -i Helm/values-dev.yaml
          
          git config user.name "FlowForge Dev Pipeline"
          git config user.email "devops@flowforge.com"
          git add Helm/values-dev.yaml
          git commit -m "chore(gitops): update ${{ inputs.service_name }} to ${{ steps.vars.outputs.short_sha }} in dev" || echo "No changes"
          git push origin test

  notify:
    name: Notify Team
    needs: [build-and-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit details
        id: commit
        run: |
          echo "AUTHOR_NAME=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')" >> $GITHUB_OUTPUT
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "COMMIT_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Determine status
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "EMOJI=❌" >> $GITHUB_OUTPUT
            echo "COLOR=#d9534f" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=FAILED" >> $GITHUB_OUTPUT
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "EMOJI=⚠️" >> $GITHUB_OUTPUT
            echo "COLOR=#f0ad4e" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=CANCELLED" >> $GITHUB_OUTPUT
          else
            echo "EMOJI=✅" >> $GITHUB_OUTPUT
            echo "COLOR=#5cb85c" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Summary Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: FlowForge DevOps <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ steps.status.outputs.EMOJI }} ${{ steps.status.outputs.STATUS_TEXT }} | CI Pipeline | ${{ inputs.service_name }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #ddd;border-radius:8px;overflow:hidden">
              <div style="background:${{ steps.status.outputs.COLOR }};color:white;padding:20px">
                <h2 style="margin:0;font-size:20px">${{ steps.status.outputs.EMOJI }} CI Pipeline ${{ steps.status.outputs.STATUS_TEXT }}</h2>
                <p style="margin:6px 0 0;opacity:0.9;font-size:14px">${{ github.event_name }} on ${{ github.ref_name }} | Service: ${{ inputs.service_name }}</p>
              </div>
              <div style="background:#f8f9fa;padding:16px 20px;border-bottom:1px solid #e9ecef">
                <h3 style="margin:0 0 12px;font-size:14px;color:#6c757d;text-transform:uppercase">Commit Details</h3>
                <table style="width:100%;border-collapse:collapse;font-size:14px">
                  <tr><td style="padding:4px 0;color:#6c757d;width:120px">Author</td><td style="font-weight:bold">${{ steps.commit.outputs.AUTHOR_NAME }}</td></tr>
                  <tr><td style="padding:4px 0;color:#6c757d">Commit ID</td><td><a href="${{ steps.commit.outputs.COMMIT_URL }}" style="color:#0366d6;font-family:monospace;font-weight:bold">${{ steps.commit.outputs.SHORT_SHA }}</a></td></tr>
                  <tr><td style="padding:4px 0;color:#6c757d">Message</td><td style="font-style:italic">${{ steps.commit.outputs.COMMIT_MSG }}</td></tr>
                </table>
              </div>
              <div style="padding:20px">
                <h3 style="margin:0 0 12px;font-size:14px;color:#6c757d;text-transform:uppercase">Pipeline Results</h3>
                <div style="text-align:center;margin-top:20px">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background:#24292e;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:14px;display:inline-block">View Logs</a>
                </div>
              </div>
            </div>
