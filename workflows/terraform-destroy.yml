name: Terraform Destroy (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev or prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm_destroy:
        description: 'I confirm I want to DESTROY the infrastructure'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_destroy == 'true' }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: "true"
      WORKING_DIR: terraform/env/${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform destroy -auto-approve

  notify:
    name: Notify Team
    needs: [terraform-destroy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "EMOJI=❌" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=FAILED" >> $GITHUB_OUTPUT
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "EMOJI=⚠️" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=CANCELLED" >> $GITHUB_OUTPUT
          else
            echo "EMOJI=🚨" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=DESTROYED" >> $GITHUB_OUTPUT
          fi

      - name: Send Summary Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: FlowForge DevOps <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ steps.status.outputs.EMOJI }} ${{ steps.status.outputs.STATUS_TEXT }} | Terraform Destroy | ${{ github.event.inputs.environment }}"
          html_body: |
            <h2>Terraform Destroy Executed</h2>
            <p><strong>Environment:</strong> ${{ github.event.inputs.environment }}</p>
            <p><strong>Status:</strong> ${{ steps.status.outputs.STATUS_TEXT }}</p>
            <p><strong>Triggered By:</strong> ${{ github.actor }}</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a></p>
